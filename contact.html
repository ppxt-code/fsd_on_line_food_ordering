<br>
<h2  class="text-blue-600 text:md sm:text-3xl font-bold">Contact Us</h2>
<br><br>
<form>
    <div class="flex flex-col p-5 text-xs sm:text-md">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required
            class="border border-gray-300 rounded-md focus:ring-4 focus:ring-blue-300 focus:outline-none sm:p-2"><br>
        <label for="email">Email:</label>
        <input type="email" id="mail" name="mail" placeholder="Enter your email" required
            class="border border-gray-300 rounded-md focus:ring-4 focus:ring-blue-300 focus:outline-none sm:p-2"><br>
        <label for="message">Message:</label>
        <textarea id="message" name="message" required
            class="border border-gray-300 rounded-md focus:ring-4 focus:ring-blue-300 focus:outline-none sm:p-2"></textarea><br>
        <div><button type="submit" onclick="sendEmail(event)" class="border border-gray-800 p-2 rounded-md bg-white hover:bg-blue-200">Submit</button></div>
        <br>
    </div>
</form>
